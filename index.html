<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>张氏族谱 · 世系图</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <div class="seal">张</div>
      <div>
        <p>慎终追远 · 敦亲睦族</p>
        <h1>张氏族谱</h1>
      </div>
    </div>
    <div class="toolbar">
      <label class="search">
        <span>⌕</span>
        <input id="searchInput" placeholder="查找族人姓名">
      </label>
      <button id="zoomOut" class="icon-btn" title="缩小">−</button>
      <span id="zoomLabel">100%</span>
      <button id="zoomIn" class="icon-btn" title="放大">＋</button>
      <button id="resetView" class="ghost-btn">归位</button>
      <button id="historyBtn" class="ghost-btn">修改记录</button>
      <button id="addRoot" class="primary-btn">＋ 新增族人</button>
      <span id="userBadge" class="user-badge">游客</span>
      <button id="authBtn" class="ghost-btn">登录 / 注册</button>
      <button id="logoutBtn" class="ghost-btn" hidden>退出</button>
    </div>
    <div class="announcement-bar">
      <span class="announcement-icon" aria-hidden="true">
        <svg viewBox="0 0 24 24"><path d="M4 10v4h3l5 4V6L7 10H4zm11.5 2a3.5 3.5 0 0 0-2-3.12v6.24A3.5 3.5 0 0 0 15.5 12zm-2-7.1v2.06a5.5 5.5 0 0 1 0 10.08v2.06a7.5 7.5 0 0 0 0-14.2z"/></svg>
      </span>
      <div class="announcement-window"><span id="announcementText" class="announcement-text">欢迎查阅张氏族谱</span></div>
      <button id="editAnnouncementBtn" class="announcement-action" hidden>编辑公告</button>
      <button id="announcementHistoryBtn" class="announcement-action">历史公告</button>
    </div>
  </header>

  <main id="viewport" class="viewport">
    <div class="generation-rail" id="generationRail"></div>
    <div id="canvas" class="canvas">
      <svg id="links" class="links"></svg>
      <div id="tree"></div>
    </div>
    <div class="canvas-tip"><kbd>空格</kbd> + 拖动 / 鼠标中键移动画布 · 滚轮缩放</div>
    <div class="legend">
      <span><i class="dot male"></i>男性</span>
      <span><i class="dot female"></i>女性</span>
      <span><i class="line-sample"></i>血缘</span>
      <span><i class="line-sample marriage"></i>婚姻</span>
    </div>
  </main>

  <aside id="drawer" class="drawer" aria-hidden="true">
    <div class="drawer-head">
      <div>
        <span class="eyebrow">人物档案</span>
        <h2 id="drawerTitle">编辑族人</h2>
      </div>
      <button id="closeDrawer" class="close-btn">×</button>
    </div>
    <form id="personForm">
      <input id="personId" type="hidden">
      <div class="form-row">
        <label>姓名<input id="personName" required></label>
        <label>性别
          <select id="personGender"><option value="male">男</option><option value="female">女</option></select>
        </label>
      </div>
      <div class="form-row">
        <label>世代<input id="personGeneration" type="number" min="1" max="30" required></label>
        <label>字辈<input id="personZi" maxlength="4" placeholder="如：源"></label>
      </div>
      <label class="switch-row">
        <span>显示字辈标记</span>
        <input id="personShowZi" type="checkbox">
      </label>
      <div class="form-row">
        <label>卡片标签<input id="personTagText" maxlength="12" placeholder="默认不显示"></label>
        <label>标签颜色
          <input id="personTagColor" type="hidden" value="#8c2f25">
          <span id="tagColorPalette" class="color-palette">
            <button type="button" data-color="#8c2f25" style="--swatch:#8c2f25" title="朱砂"></button>
            <button type="button" data-color="#a77b36" style="--swatch:#a77b36" title="鎏金"></button>
            <button type="button" data-color="#536b62" style="--swatch:#536b62" title="松绿"></button>
            <button type="button" data-color="#3f6375" style="--swatch:#3f6375" title="黛蓝"></button>
            <button type="button" data-color="#72566f" style="--swatch:#72566f" title="烟紫"></button>
            <button type="button" data-color="#72513b" style="--swatch:#72513b" title="檀棕"></button>
            <button type="button" data-color="#5d6468" style="--swatch:#5d6468" title="青灰"></button>
            <button type="button" data-color="#2f2b27" style="--swatch:#2f2b27" title="墨黑"></button>
          </span>
        </label>
      </div>
      <div class="form-row">
        <label>出生时间<input id="personBirthDate" type="date"></label>
        <label>死亡时间
          <input id="personDeathDate" type="date">
          <span class="unknown-date"><input id="personDeathUnknown" type="checkbox"> 日期不详</span>
        </label>
      </div>
      <label>生平备注<textarea id="personNote" rows="3" placeholder="生卒、排行、迁居等信息"></textarea></label>
      <div class="relation-box" id="relationBox"></div>
      <div class="form-actions">
        <button id="deletePerson" type="button" class="danger-btn">删除人物</button>
        <button type="submit" class="primary-btn">保存修改</button>
      </div>
    </form>
  </aside>
  <div id="modalBackdrop" class="backdrop"></div>

  <dialog id="relationDialog">
    <form id="relationForm" method="dialog">
      <div class="drawer-head">
        <div><span class="eyebrow">建立关系</span><h2 id="relationTitle">新增亲属</h2></div>
        <button value="cancel" class="close-btn">×</button>
      </div>
      <input id="relationPersonId" type="hidden">
      <input id="relationType" type="hidden">
      <label>姓名<input id="relationName" required></label>
      <div class="form-row">
        <label>性别<select id="relationGender"><option value="male">男</option><option value="female">女</option></select></label>
        <label>字辈<input id="relationZi" maxlength="4"></label>
      </div>
      <label>备注<textarea id="relationNote" rows="2"></textarea></label>
      <button value="default" class="primary-btn wide">确认新增</button>
    </form>
  </dialog>

  <dialog id="authDialog" class="auth-dialog">
    <div class="drawer-head">
      <div><span class="eyebrow">账号权限</span><h2>登录与族人注册</h2></div>
      <button id="closeAuth" class="close-btn">×</button>
    </div>
    <div class="auth-grid">
      <form id="loginForm">
        <h3>登录</h3>
        <label>账号<input id="loginUsername" autocomplete="username" required></label>
        <label>密码<input id="loginPassword" type="password" autocomplete="current-password" required></label>
        <p id="loginMessage" class="form-message"></p>
        <button class="primary-btn wide" type="submit">登录</button>
      </form>
      <form id="registerForm">
        <h3>注册族人账号</h3>
        <label>本人姓名（登录账号）<input id="registerName" minlength="2" required></label>
        <label>所属世代
          <select id="registerGeneration" required>
            <option value="">请选择世代</option>
          </select>
        </label>
        <label>密码<input id="registerPassword" type="password" minlength="6" required></label>
        <label>确认密码<input id="registerConfirm" type="password" minlength="6" required></label>
        <p id="registerMessage" class="form-message"></p>
        <button class="ghost-btn wide" type="submit">注册账号</button>
      </form>
    </div>
    <p class="auth-note">游客可直接浏览；族人账号可提交修改申请；管理员账号固定为 admin123 / admin123，负责审核并维护族谱。</p>
  </dialog>

  <dialog id="historyDialog" class="history-dialog">
    <div class="drawer-head">
      <div><span class="eyebrow">操作审计</span><h2 id="historyTitle">申请与修改记录</h2></div>
      <button id="closeHistory" class="close-btn">×</button>
    </div>
    <h3 class="history-section-title">改动申请</h3>
    <div class="history-table-wrap request-table-wrap">
      <table class="history-table">
        <thead><tr><th>提交时间</th><th>申请人</th><th>申请内容</th><th>状态</th><th>审核</th></tr></thead>
        <tbody id="requestBody"></tbody>
      </table>
    </div>
    <h3 class="history-section-title">已生效的修改记录</h3>
    <div class="history-table-wrap">
      <table class="history-table">
        <thead><tr><th>时间</th><th>操作者</th><th>操作</th><th>人物</th><th>修改内容</th></tr></thead>
        <tbody id="historyBody"></tbody>
      </table>
    </div>
    <button id="clearHistory" class="danger-btn">清空记录</button>
  </dialog>

  <dialog id="announcementDialog" class="announcement-dialog">
    <div class="drawer-head">
      <div><span class="eyebrow">宗族公告</span><h2 id="announcementDialogTitle">历史公告</h2></div>
      <button id="closeAnnouncement" class="close-btn">×</button>
    </div>
    <form id="announcementForm" hidden>
      <label>公告内容<textarea id="announcementInput" rows="3" maxlength="300" placeholder="请输入公告内容"></textarea></label>
      <button class="primary-btn" type="submit">发布公告</button>
    </form>
    <div id="announcementHistory" class="announcement-history"></div>
  </dialog>

  <script src="app.js"></script>
</body>
</html>
